<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Shortener</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <h1>Link Shortener</h1>

    <!-- Auth section -->
    <div id="auth-section">
      <div id="logged-out">
        <div class="tabs">
          <button class="tab active" data-tab="shorten-tab">Shorten a link</button>
          <button class="tab" data-tab="login-tab">Login</button>
          <button class="tab" data-tab="register-tab">Register</button>
        </div>
      </div>
      <div id="logged-in" hidden>
        <p>Logged in as <strong id="user-email"></strong></p>
        <button id="logout-btn">Logout</button>
      </div>
    </div>

    <!-- Shorten tab -->
    <div id="shorten-tab" class="tab-content active">
      <form id="shorten-form">
        <input type="url" id="url-input" placeholder="Paste a URL to shorten" required>
        <button type="submit">Shorten</button>
      </form>
      <div id="shorten-result" hidden>
        <p>Short URL:</p>
        <div class="result-row">
          <a id="short-url" href="#" target="_blank"></a>
          <button id="copy-btn">Copy</button>
        </div>
        <p id="existing-note" hidden>This URL was already shortened.</p>
      </div>
      <p id="shorten-error" class="error" hidden></p>
    </div>

    <!-- Login tab -->
    <div id="login-tab" class="tab-content">
      <form id="login-form">
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>
      <p id="login-error" class="error" hidden></p>
    </div>

    <!-- Register tab -->
    <div id="register-tab" class="tab-content">
      <form id="register-form">
        <input type="email" id="register-email" placeholder="Email" required>
        <input type="password" id="register-password" placeholder="Password (min 8 chars)" required minlength="8">
        <button type="submit">Register</button>
      </form>
      <p id="register-error" class="error" hidden></p>
    </div>

    <!-- My Links (shown when logged in) -->
    <div id="my-links" hidden>
      <h2>My Links</h2>
      <table id="links-table">
        <thead>
          <tr>
            <th>Short URL</th>
            <th>Original URL</th>
            <th>Clicks</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody id="links-body"></tbody>
      </table>
      <p id="no-links" hidden>No links yet. Shorten one above!</p>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
