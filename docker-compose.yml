name: link-shortener-claude

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: linkshort
      POSTGRES_PASSWORD: linkshort
      POSTGRES_DB: linkshort
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
